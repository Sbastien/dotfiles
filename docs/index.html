<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ===========================================
           Custom Fonts
           =========================================== */
        @font-face {
            font-family: 'Paint';
            src: url('Paint.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ===========================================
           CSS Variables
           =========================================== */
        :root {
            /* Colors */
            --color-bg: #000;
            --color-blood-dark: #400;
            --color-blood: #611;
            --color-blood-light: #833;
            --color-blood-bright: #944;
            --color-text: #b55;
            --color-glow: #500;
            --color-hint: #444;

            /* Z-index layers */
            --z-base: 10;
            --z-effects: 25;
            --z-overlay: 50;
            --z-ui: 100;
            --z-cursor: 9999;

            /* Transitions */
            --transition-fast: 0.1s;
            --transition-normal: 0.4s;
            --transition-slow: 0.5s;

            /* Layout */
            --edge-size: 50px;
        }

        /* ===========================================
           Reset & Base
           =========================================== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
        }

        /* ===========================================
           Utility Classes
           =========================================== */
        .fixed-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .floating-text {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s ease;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .floating-text.visible {
            opacity: 0.8;
        }

        .hidden {
            opacity: 0 !important;
        }

        /* ===========================================
           Custom Cursor
           =========================================== */
        .cursor {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #300;
            border-radius: 50%;
            pointer-events: none;
            z-index: var(--z-cursor);
            transition: transform var(--transition-fast);
            mix-blend-mode: difference;
        }

        .cursor.click {
            transform: scale(3);
            background: var(--color-glow);
        }

        .cursor.bleeding::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, var(--color-blood) 0%, transparent 70%);
            border-radius: 50%;
            animation: blood-drip-cursor 0.5s ease-out forwards;
            pointer-events: none;
        }

        .blood-drop {
            position: fixed;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, var(--color-blood) 30%, var(--color-blood-dark) 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: calc(var(--z-cursor) - 1);
            animation: blood-drop-fade 3s ease-out forwards;
        }

        @keyframes blood-drop-fade {
            to {
                opacity: 0;
                transform: scale(0.5);
            }
        }

        /* ===========================================
           Overlays
           =========================================== */
        .noise {
            z-index: var(--z-ui);
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .vignette {
            z-index: var(--z-overlay);
            background: radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
            animation: vignette-breathe 6s ease-in-out infinite;
        }

        @keyframes vignette-breathe {
            0%, 100% {
                background: radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
            }
            50% {
                background: radial-gradient(ellipse at center, transparent 0%, transparent 30%, rgba(0, 0, 0, 0.85) 100%);
            }
        }

        .flash-overlay {
            z-index: var(--z-effects);
            background: #200;
            opacity: 0;
            transition: opacity 0.05s;
        }

        .flash-overlay.active {
            opacity: 0.3;
        }

        /* ===========================================
           Edge Darkness
           =========================================== */
        .edge-darkness {
            position: fixed;
            pointer-events: none;
            z-index: 45;
            background: var(--color-bg);
            animation: edge-breathe 8s ease-in-out infinite;
        }

        .edge-darkness.left { inset: 0 auto 0 0; width: var(--edge-size); }
        .edge-darkness.right { inset: 0 0 0 auto; width: var(--edge-size); }
        .edge-darkness.top { inset: 0 0 auto 0; height: var(--edge-size); }
        .edge-darkness.bottom { inset: auto 0 0 0; height: var(--edge-size); }

        @keyframes edge-breathe {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }

        /* ===========================================
           Blood Drip
           =========================================== */
        .drip {
            position: fixed;
            top: -50px;
            width: 3px;
            height: 0;
            background: linear-gradient(to bottom, transparent, #711, #922);
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            box-shadow: 0 0 6px var(--color-glow);
        }

        .drip.active {
            animation: drip-fall 4s ease-in forwards;
        }

        @keyframes drip-fall {
            0% { height: 0; opacity: 0.6; top: -50px; }
            70% { height: 150px; opacity: 0.4; }
            100% { height: 200px; opacity: 0; top: 100%; }
        }

        /* ===========================================
           Blood Handprint
           =========================================== */
        .blood-handprint {
            position: fixed;
            pointer-events: none;
            z-index: var(--z-effects);
            width: 80px;
            height: auto;
            opacity: 0;
            filter: brightness(0.3) saturate(0.6);
            animation:
                handprint-appear var(--transition-fast) ease-out forwards,
                handprint-fade 15s ease 1s forwards;
        }

        @keyframes handprint-appear {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 0.6; transform: scale(1); }
        }

        @keyframes handprint-fade {
            to { opacity: 0; }
        }

        /* ===========================================
           Glitch & Distortion Effects
           =========================================== */
        @keyframes glitch {
            0% { transform: translate(0); filter: hue-rotate(0deg); }
            10% { transform: translate(-5px, 3px); filter: hue-rotate(90deg); }
            20% { transform: translate(3px, -3px); filter: hue-rotate(180deg); }
            30% { transform: translate(-3px, 0); filter: hue-rotate(270deg); }
            40% { transform: translate(5px, 2px); filter: hue-rotate(0deg); }
            50% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 3px); clip-path: inset(30% 0 40% 0); }
            70% { transform: translate(-3px, 0); clip-path: inset(50% 0 20% 0); }
            80% { transform: translate(0, -3px); clip-path: none; }
            90% { transform: translate(3px, 2px); }
            100% { transform: translate(0); filter: none; }
        }

        body.glitch {
            animation: glitch 0.3s ease forwards;
        }

        @keyframes distortion {
            0%, 100% { filter: none; transform: none; }
            20% { filter: blur(1px) brightness(0.9); transform: scale(1.005) skewX(0.3deg); }
            40% { filter: blur(0.5px) brightness(1.1); transform: scale(0.995) skewY(-0.3deg); }
            60% { filter: blur(1.5px) brightness(0.85); transform: scale(1.003) skewX(-0.2deg) translateX(2px); }
            80% { filter: blur(0.8px) brightness(1.05); transform: scale(0.997) skewY(0.2deg) translateX(-2px); }
        }

        body.distort {
            animation: distortion 0.5s ease forwards;
        }

        /* ===========================================
           Main Button
           =========================================== */
        .container {
            text-align: center;
            z-index: var(--z-base);
            transition: opacity var(--transition-slow) ease;
            animation: heartbeat 4s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 20%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 transparent); }
            5% { transform: scale(1.03); filter: drop-shadow(0 0 15px var(--color-blood)) drop-shadow(0 0 30px var(--color-blood-dark)); }
            10% { transform: scale(1); filter: drop-shadow(0 0 5px var(--color-blood-dark)); }
            15% { transform: scale(1.02); filter: drop-shadow(0 0 10px var(--color-blood)) drop-shadow(0 0 20px var(--color-blood-dark)); }
        }

        .container a {
            color: inherit;
            text-decoration: none;
            display: inline-block;
        }

        .text {
            font-size: 1.1rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            opacity: 0.9;
            animation: fadeIn 3s ease-in 1s forwards;
            color: var(--color-blood-light);
            text-shadow: 0 0 20px var(--color-glow), 0 0 40px #300;
            padding: 15px 30px;
            border: 1px solid #322;
            transition:
                color var(--transition-normal) ease,
                text-shadow var(--transition-normal) ease,
                letter-spacing var(--transition-normal) ease,
                border-color var(--transition-normal) ease;
        }

        .text:hover {
            color: var(--color-blood-bright);
            border-color: #433;
            text-shadow: 0 0 25px #600, 0 0 50px #300;
            letter-spacing: 14px;
            cursor: pointer;
        }

        .text.hidden {
            opacity: 0 !important;
            transition: none;
        }

        .text.zalgo {
            animation: zalgo-corrupt 3s ease-in-out infinite;
        }

        @keyframes zalgo-corrupt {
            0%, 100% {
                text-shadow: 0 0 20px var(--color-glow), 0 0 40px #300;
                transform: none;
                letter-spacing: 10px;
                opacity: 0.9;
            }
            30% {
                text-shadow: 0 0 25px var(--color-glow), 0 0 50px #200, -1px 0 #311;
                transform: translateX(-1px);
                letter-spacing: 11px;
                opacity: 0.7;
            }
            50% {
                text-shadow: 0 0 15px var(--color-glow), 0 0 35px #300, 1px 0 #422;
                transform: translateX(1px) translateY(-1px);
                letter-spacing: 9px;
                opacity: 0.85;
            }
            70% {
                text-shadow: 0 0 30px var(--color-glow), 0 0 45px #200;
                transform: translateY(1px);
                letter-spacing: 10px;
                opacity: 0.75;
            }
        }

        @keyframes fadeIn {
            to { opacity: 0.9; }
        }

        /* ===========================================
           Hidden Corner Messages
           =========================================== */
        .hidden-message {
            position: fixed;
            font-size: 1rem;
            letter-spacing: 6px;
            opacity: 0;
            color: var(--color-text);
            pointer-events: none;
            transition: opacity 2s ease;
            text-shadow: 0 0 12px #800;
        }

        .corner-tl { top: 30px; left: 30px; }
        .corner-tr { top: 30px; right: 30px; }
        .corner-bl { bottom: 30px; left: 30px; }
        .corner-br { bottom: 30px; right: 30px; }

        /* ===========================================
           Floating Text Effects
           =========================================== */
        .incantation {
            font-family: 'Times New Roman', serif;
            font-size: 1.2rem;
            font-style: italic;
            letter-spacing: 3px;
            color: #666;
            z-index: 12;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .incantation.visible {
            opacity: 0.6;
        }

        .creepy-text {
            font-family: 'Paint', cursive;
            font-size: 2.5rem;
            color: #b33;
            z-index: 13;
            text-shadow: 0 0 10px #800, 0 0 20px #600, 0 0 30px #400;
            transition: transform 2s ease-in, filter 2s ease-in, opacity 2s ease-in, letter-spacing 2s ease-in;
        }

        .creepy-text.visible {
            opacity: 0.85;
        }

        /* Creepy text disappearance effects */
        .creepy-text.melting {
            transform: translateX(-50%) translateY(40px) scaleY(1.8);
            filter: blur(4px);
            opacity: 0;
        }

        .creepy-text.dissolve {
            transform: translateX(-50%) scale(1.2);
            filter: blur(8px) brightness(0.5);
            opacity: 0;
            letter-spacing: 15px;
        }

        .creepy-text.glitch-out {
            animation: creepy-glitch-out 0.8s steps(4) forwards;
        }

        @keyframes creepy-glitch-out {
            0% { opacity: 0.85; transform: translateX(-50%); }
            25% { opacity: 0.6; transform: translateX(-48%) skewX(5deg); filter: blur(1px); }
            50% { opacity: 0.4; transform: translateX(-52%) skewX(-8deg); filter: blur(2px); }
            75% { opacity: 0.2; transform: translateX(-50%) skewX(3deg) scaleX(1.1); filter: blur(3px); }
            100% { opacity: 0; transform: translateX(-50%) scaleY(0); filter: blur(5px); }
        }

        .creepy-text.fade-out {
            opacity: 0;
            transform: translateX(-50%) scale(0.95);
        }

        /* ===========================================
           Blood Writing Effect
           =========================================== */
        .blood-writing {
            position: fixed;
            pointer-events: none;
            z-index: var(--z-effects);
            opacity: 0;
            transition: opacity 1s ease;
            font-family: 'Paint', cursive;
            font-size: 3rem;
            color: #c33;
            text-shadow: 0 0 10px #800, 0 0 20px #600, 0 0 30px #400;
            white-space: nowrap;
            overflow: visible;
        }

        .blood-writing.visible {
            opacity: 0.9;
        }

        /* ===========================================
           Click Hint
           =========================================== */
        .click-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: var(--color-hint);
            pointer-events: none;
            z-index: var(--z-ui);
            animation: hint-pulse 3s ease-in-out infinite;
            transition: opacity 1s ease;
        }

        .click-hint.hidden {
            opacity: 0;
        }

        @keyframes hint-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <!-- Cursor -->
    <div class="cursor" id="cursor"></div>

    <!-- Overlays -->
    <div class="fixed-overlay noise"></div>
    <div class="fixed-overlay vignette"></div>
    <div class="fixed-overlay flash-overlay" id="flashOverlay"></div>

    <!-- Edge Darkness -->
    <div class="edge-darkness left"></div>
    <div class="edge-darkness right"></div>
    <div class="edge-darkness top"></div>
    <div class="edge-darkness bottom"></div>

    <!-- Blood Drips -->
    <div class="drip" id="drip1"></div>
    <div class="drip" id="drip2"></div>

    <!-- Hidden Messages -->
    <div class="hidden-message corner-tl" id="msg1">watching</div>
    <div class="hidden-message corner-tr" id="msg2">always</div>
    <div class="hidden-message corner-bl" id="msg3">waiting</div>
    <div class="hidden-message corner-br" id="msg4">here</div>

    <!-- Main Button -->
    <div class="container" id="container">
        <a href="https://github.com/Sbastien/dotfiles" id="button">
            <p class="text" id="buttonText">source me</p>
        </a>
    </div>

    <!-- Click Hint -->
    <div class="click-hint" id="clickHint">click anywhere</div>

    <!-- Blood Writing Effect -->
    <div class="blood-writing" id="bloodWriting"></div>

    <!-- Floating Text Effects -->
    <div class="floating-text incantation" id="incant1"></div>
    <div class="floating-text incantation" id="incant2"></div>
    <div class="floating-text creepy-text" id="creepy1"></div>
    <div class="floating-text creepy-text" id="creepy2"></div>

    <!-- Audio -->
    <audio id="ambientSound" loop preload="auto">
        <source src="whispers.mp3" type="audio/mpeg">
    </audio>
    <audio id="crySound1" preload="auto">
        <source src="cry-woman.mp3" type="audio/mpeg">
    </audio>
    <audio id="crySound2" preload="auto">
        <source src="cry-baby.mp3" type="audio/mpeg">
    </audio>

    <script>
    /**
     * Horror Effects Library
     * Modular system for creating horror-themed web experiences
     */
    (() => {
        'use strict';

        // =============================================
        // CONFIGURATION
        // =============================================
        const CONFIG = {
            // Button behavior
            button: {
                maxClicks: 3,
                texts: ['dont leave', 'let me out'],  // After clicks 0 and 1; click 2 redirects
                teaserTexts: [
                    // Incitation technique
                    'source me', 'execute me', 'run me', 'init me',
                    // Mystère
                    'i hold secrets', 'configs within', 'hidden paths',
                    // Incitation douce
                    'come closer', 'just one click', 'trust the shell'
                ],
                effects: [
                    { sound: 0, glitch: true, flash: false },
                    { sound: 1, glitch: true, flash: true },
                    { sound: 'random', glitch: true, flash: true }
                ]
            },

            // Audio volumes
            audio: {
                ambient: 0.15,
                cry: 0.4
            },

            // Effect timing (ms)
            timing: {
                drip: { interval: 6000, probability: 0.4, initialDelay: 1000 },
                incantation: {
                    initialDelay: { min: 3000, max: 5000 },
                    interval: { min: 10000, max: 18000 },
                    duration: { min: 8000, extra: 5000 }
                },
                creepyText: {
                    initialDelay: { min: 2000, max: 5000 },
                    interval: { min: 12000, max: 25000 },
                    cooldown: 8000, // Minimum time between two creepy texts
                    duration: { min: 5000, extra: 3000 }
                },
                glitch: { interval: 8000, probability: 0.3, initialDelay: 2500 },
                distortion: { interval: 6000, probability: 0.4, initialDelay: 4000 },
                zalgo: { interval: 8000, probability: 0.5, initialDelay: 5000, duration: 5000 },
                teaser: { interval: 12000, probability: 0.4, initialDelay: 6000, duration: 3000 },
                bloodWriting: { interval: 15000, probability: 0.35, initialDelay: 8000, letterDelay: 120, holdDuration: 4000 }
            },

            // Content
            content: {
                bloodWritingPhrases: [
                    'you are not alone', 'come play with me', 'never leave', 'join us',
                    'we see you', 'its too late now', 'no escape', 'stay forever'
                ],
                incantations: [
                    "ph'nglui mglw'nafh", 'ia ia cthulhu fhtagn', 'tekeli-li tekeli-li',
                    'exsuscita ex mortuis', 'aperire portas inferni', 'sanguis bibimus',
                    'zazas zazas nasatanada zazas', 'veni omnipotens aeterne diabolus'
                ],
                creepyTexts: [
                    // Présence
                    'behind you', 'im here', 'found you', 'i see you', 'not alone',
                    // Urgence
                    'run', 'too late', 'dont move', 'stay still', 'dont blink',
                    // Intimité dérangeante
                    'i know you', 'i remember', 'you forgot me', 'we met before',
                    // Ambiguïté
                    'look closer', 'can you hear it', 'do you feel it', 'almost there',
                    // Menace sourde
                    'not yet', 'soon', 'patience', 'wait for me', 'your turn'
                ],
                handprints: ['bloody-handprint-1.png', 'bloody-handprint-2.png', 'bloody-handprint-3.png']
            },

            // Layout
            layout: {
                edgeMarginPercent: 0.25,
                textBuffer: 20,
                buttonRepositionPadding: 50
            }
        };

        // =============================================
        // UTILITIES
        // =============================================
        const $ = (id) => document.getElementById(id);

        const randomPick = (arr) => arr[Math.floor(Math.random() * arr.length)];

        const randomRange = (min, max) => Math.random() * (max - min) + min;

        const chance = (probability) => Math.random() < probability;

        const tempClass = (element, className, duration) => {
            element.classList.add(className);
            setTimeout(() => element.classList.remove(className), duration);
        };

        const createElement = (tag, className, styles = {}) => {
            const el = document.createElement(tag);
            if (className) el.className = className;
            Object.assign(el.style, styles);
            return el;
        };

        const forceReflow = (element) => void element.offsetWidth;

        const getElementCenter = (element) => {
            const rect = element.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        };

        // =============================================
        // POSITION CALCULATOR
        // =============================================
        const Position = {
            /**
             * Calculate safe position avoiding edges and optionally a center point
             * @param {Object} options
             * @param {number} options.textWidth - Width of text to position (for edge calculation)
             * @param {Object} options.avoidCenter - Point to avoid { x, y }
             * @param {number} options.centerMargin - Minimum distance from avoidCenter
             */
            getSafe({ textWidth = 0, avoidCenter = null, centerMargin = 100 } = {}) {
                const { edgeMarginPercent, textBuffer } = CONFIG.layout;
                const { innerWidth: vw, innerHeight: vh } = window;

                const verticalMargin = vh * edgeMarginPercent;
                const horizontalMargin = Math.max(textWidth / 2 + textBuffer, vw * edgeMarginPercent);

                const bounds = {
                    minX: horizontalMargin,
                    maxX: vw - horizontalMargin,
                    minY: verticalMargin,
                    maxY: vh - verticalMargin
                };

                let x, y, attempts = 0;
                const maxAttempts = 20;

                do {
                    x = randomRange(bounds.minX, bounds.maxX);
                    y = randomRange(bounds.minY, bounds.maxY);
                    attempts++;
                } while (
                    avoidCenter &&
                    attempts < maxAttempts &&
                    Math.abs(x - avoidCenter.x) < centerMargin &&
                    Math.abs(y - avoidCenter.y) < centerMargin
                );

                return { x, y };
            },

            toPercent(pos) {
                return {
                    x: `${(pos.x / window.innerWidth) * 100}%`,
                    y: `${(pos.y / window.innerHeight) * 100}%`
                };
            }
        };

        // =============================================
        // TYPEWRITER
        // =============================================
        const Typewriter = {
            type(element, text, delay = 150, onComplete = null) {
                element.textContent = '';
                let index = 0;

                const intervalId = setInterval(() => {
                    if (index < text.length) {
                        element.textContent += text[index++];
                    } else {
                        clearInterval(intervalId);
                        onComplete?.();
                    }
                }, delay);

                return {
                    stop: () => clearInterval(intervalId),
                    duration: text.length * delay
                };
            },

            erase(element, delay = 100, onComplete = null) {
                let length = element.textContent.length;

                const intervalId = setInterval(() => {
                    if (length > 0) {
                        element.textContent = element.textContent.slice(0, --length);
                    } else {
                        clearInterval(intervalId);
                        onComplete?.();
                    }
                }, delay);

                return {
                    stop: () => clearInterval(intervalId),
                    duration: length * delay
                };
            }
        };

        // =============================================
        // AUDIO MANAGER
        // =============================================
        const AudioManager = {
            sounds: new Map(),
            ambientStarted: false,

            register(name, element, volume) {
                this.sounds.set(name, { element, volume });
            },

            play(name, options = {}) {
                const sound = this.sounds.get(name);
                if (!sound) return null;

                const { element, volume } = sound;
                element.currentTime = options.startTime || 0;
                element.volume = options.volume ?? volume;
                element.play().catch(() => {});
                return element;
            },

            startAmbient(name) {
                if (this.ambientStarted) return false;
                this.ambientStarted = true;

                const result = this.play(name);
                if (!result) this.ambientStarted = false;
                return !!result;
            }
        };

        // =============================================
        // EFFECT SCHEDULER
        // =============================================
        const Scheduler = {
            intervals: [],
            timeouts: [],

            /** Fixed interval scheduling with probability */
            add(callback, interval, probability = 1, initialDelay = null) {
                if (initialDelay !== null) {
                    const t = setTimeout(() => {
                        if (chance(probability)) callback();
                    }, initialDelay);
                    this.timeouts.push(t);
                }

                const id = setInterval(() => {
                    if (chance(probability)) callback();
                }, interval);

                this.intervals.push(id);
                return id;
            },

            /** Random interval scheduling (recursive setTimeout) */
            addRandom(callback, intervalRange, initialDelayRange = null) {
                const scheduleNext = () => {
                    const delay = randomRange(intervalRange.min, intervalRange.max);
                    const t = setTimeout(() => {
                        callback();
                        scheduleNext();
                    }, delay);
                    this.timeouts.push(t);
                };

                if (initialDelayRange) {
                    const initDelay = randomRange(initialDelayRange.min, initialDelayRange.max);
                    const t = setTimeout(() => {
                        callback();
                        scheduleNext();
                    }, initDelay);
                    this.timeouts.push(t);
                } else {
                    scheduleNext();
                }
            },

            clear() {
                this.intervals.forEach(clearInterval);
                this.timeouts.forEach(clearTimeout);
                this.intervals = [];
                this.timeouts = [];
            }
        };

        // =============================================
        // FLOATING TEXT
        // =============================================
        const FloatingText = {
            activeCount: 0,
            maxActive: 3,
            disappearEffects: ['melting', 'dissolve', 'glitch-out', 'fade-out'],
            lastCreepyTime: 0, // Track last creepy text appearance

            measureText(element, text) {
                const original = {
                    textContent: element.textContent,
                    visibility: element.style.visibility
                };

                element.textContent = text;
                element.style.visibility = 'hidden';
                element.classList.add('visible');

                const width = element.offsetWidth;

                element.classList.remove('visible');
                element.style.visibility = original.visibility;
                element.textContent = original.textContent;

                return width;
            },

            show(element, content, options = {}) {
                const {
                    duration = 4000,
                    centerMargin = 100,
                    typewriterDelay = 120,
                    eraseDelay = 80,
                    avoidElement = null,
                    useSpecialDisappear = false,
                    effectDuration = 2000,
                    cooldown = 0
                } = options;

                if (this.activeCount >= this.maxActive) return false;

                // Check cooldown for creepy texts
                if (cooldown > 0) {
                    const now = Date.now();
                    if (now - this.lastCreepyTime < cooldown) return false;
                    this.lastCreepyTime = now;
                }

                this.activeCount++;

                // Measure and position
                const textWidth = this.measureText(element, content);
                const avoidCenter = avoidElement ? getElementCenter(avoidElement) : null;
                const pos = Position.getSafe({ textWidth, avoidCenter, centerMargin });

                // Reset element state
                element.style.left = `${pos.x}px`;
                element.style.top = `${pos.y}px`;
                element.textContent = '';
                this.disappearEffects.forEach(cls => element.classList.remove(cls));
                element.classList.add('visible');

                // Type the text
                const tw = Typewriter.type(element, content, typewriterDelay);

                // Schedule disappearance
                setTimeout(() => {
                    if (useSpecialDisappear) {
                        const effect = randomPick(this.disappearEffects);
                        element.classList.add(effect);
                        setTimeout(() => {
                            element.classList.remove('visible', effect);
                            this.activeCount--;
                        }, effectDuration);
                    } else {
                        Typewriter.erase(element, eraseDelay, () => {
                            element.classList.remove('visible');
                            this.activeCount--;
                        });
                    }
                }, tw.duration + duration);

                return true;
            }
        };

        // =============================================
        // CUSTOM CURSOR
        // =============================================
        const CustomCursor = {
            element: null,
            position: { x: 0, y: 0 },
            bleeding: false,

            init(element) {
                this.element = element;
                document.addEventListener('mousemove', (e) => this.handleMove(e));
                document.addEventListener('mousedown', () => this.handleClick(true));
                document.addEventListener('mouseup', () => this.handleClick(false));
            },

            handleMove(e) {
                this.position = { x: e.clientX, y: e.clientY };
                this.element.style.left = `${e.clientX - 2}px`;
                this.element.style.top = `${e.clientY - 2}px`;
            },

            handleClick(isDown) {
                this.element.classList.toggle('click', isDown);
            },

            startBleeding(duration = 15000, dropInterval = 80) {
                if (this.bleeding) return;
                this.bleeding = true;
                this.element.classList.add('bleeding');

                const intervalId = setInterval(() => {
                    if (!this.bleeding) {
                        clearInterval(intervalId);
                        return;
                    }
                    this.createBloodDrop();
                }, dropInterval);

                setTimeout(() => {
                    this.bleeding = false;
                    this.element.classList.remove('bleeding');
                }, duration);
            },

            createBloodDrop() {
                const drop = createElement('div', 'blood-drop', {
                    left: `${this.position.x + randomRange(-5, 5)}px`,
                    top: `${this.position.y + randomRange(-5, 5)}px`
                });
                document.body.appendChild(drop);
                setTimeout(() => drop.remove(), 3000);
            }
        };

        // =============================================
        // VISUAL EFFECTS
        // =============================================
        const VisualEffects = {
            glitch: (duration = 300) => tempClass(document.body, 'glitch', duration),

            distortion: (duration = 400) => tempClass(document.body, 'distort', duration),

            flash: (element, duration = 80) => tempClass(element, 'active', duration),

            drip(dripElements) {
                const drip = randomPick(dripElements);
                drip.style.left = `${Math.random() * 100}%`;
                drip.classList.remove('active');
                forceReflow(drip);
                drip.classList.add('active');
            },

            handprint(x, y, images, duration = 16000) {
                const img = createElement('img', 'blood-handprint', {
                    left: `${x - 40}px`,
                    top: `${y - 50}px`,
                    transform: `rotate(${randomRange(-30, 30)}deg) scaleX(${chance(0.5) ? 1 : -1})`
                });
                img.src = randomPick(images);
                document.body.appendChild(img);
                setTimeout(() => img.remove(), duration);
            }
        };

        // =============================================
        // BLOOD WRITING
        // =============================================
        const BloodWriting = {
            element: null,
            phrases: [],
            active: false,

            init(element, phrases) {
                this.element = element;
                this.phrases = phrases;
            },

            show(options = {}) {
                if (this.active) return;

                const {
                    letterDelay = 120,
                    eraseDelay = 80,
                    holdDuration = 4000,
                    avoidElement = null,
                    centerMargin = 300
                } = options;

                this.active = true;
                const phrase = randomPick(this.phrases);

                const avoidCenter = avoidElement ? getElementCenter(avoidElement) : null;
                const pos = Position.toPercent(Position.getSafe({ avoidCenter, centerMargin }));

                this.element.style.left = pos.x;
                this.element.style.top = pos.y;
                this.element.textContent = '';
                this.element.classList.add('visible');

                const tw = Typewriter.type(this.element, phrase, letterDelay);

                setTimeout(() => {
                    Typewriter.erase(this.element, eraseDelay, () => {
                        this.element.classList.remove('visible');
                        this.active = false;
                    });
                }, tw.duration + holdDuration);
            }
        };

        // =============================================
        // BUTTON TEASER
        // =============================================
        const ButtonTeaser = {
            element: null,
            originalText: '',
            teaserTexts: [],
            active: false,
            clicked: false,

            init(element, teaserTexts) {
                this.element = element;
                this.originalText = element.textContent;
                this.teaserTexts = teaserTexts;
            },

            show(duration = 4000) {
                if (this.active || this.clicked || this.element.classList.contains('hidden')) return;

                this.active = true;
                this.element.textContent = randomPick(this.teaserTexts);

                setTimeout(() => {
                    if (!this.clicked && !this.element.classList.contains('hidden')) {
                        this.element.textContent = this.originalText;
                    }
                    this.active = false;
                }, duration);
            },

            markClicked() {
                this.clicked = true;
            }
        };

        // =============================================
        // DOM ELEMENTS
        // =============================================
        const elements = {
            cursor: $('cursor'),
            container: $('container'),
            button: $('button'),
            buttonText: $('buttonText'),
            flashOverlay: $('flashOverlay'),
            clickHint: $('clickHint'),
            ambientSound: $('ambientSound'),
            crySounds: [$('crySound1'), $('crySound2')],
            drips: [$('drip1'), $('drip2')],
            messages: [$('msg1'), $('msg2'), $('msg3'), $('msg4')],
            incantations: [$('incant1'), $('incant2')],
            creepyTexts: [$('creepy1'), $('creepy2')],
            bloodWriting: $('bloodWriting')
        };

        // =============================================
        // APPLICATION STATE
        // =============================================
        const state = { clickCount: 0 };

        // =============================================
        // EVENT HANDLERS
        // =============================================
        const handleFirstInteraction = () => {
            AudioManager.startAmbient('ambient');
            elements.clickHint.classList.add('hidden');
        };

        const handleMouseMove = () => {
            if (chance(0.01)) {
                const msg = randomPick(elements.messages);
                msg.style.opacity = '0.4';
                setTimeout(() => (msg.style.opacity = '0'), 2000);
            }
        };

        const handleButtonClick = (e) => {
            if (state.clickCount >= CONFIG.button.maxClicks) return;

            e.preventDefault();
            ButtonTeaser.markClicked();

            // Hide button immediately
            elements.buttonText.classList.add('hidden');
            elements.container.style.pointerEvents = 'none';

            const effect = CONFIG.button.effects[state.clickCount];
            const currentClick = state.clickCount;
            state.clickCount++;

            // Apply visual effects
            VisualEffects.handprint(e.clientX, e.clientY, CONFIG.content.handprints);
            CustomCursor.startBleeding();
            if (effect.glitch) VisualEffects.glitch();
            if (effect.flash) setTimeout(() => VisualEffects.flash(elements.flashOverlay), 150);

            // Play cry sound
            const soundIndex = effect.sound === 'random'
                ? Math.floor(Math.random() * elements.crySounds.length)
                : effect.sound;
            const sound = AudioManager.play(`cry${soundIndex}`);

            // Handle post-sound action (reposition or redirect)
            let handled = false;
            const onSoundComplete = () => {
                if (handled) return;
                handled = true;

                // Final click: redirect to GitHub
                if (state.clickCount >= CONFIG.button.maxClicks) {
                    window.location.href = elements.button.href;
                    return;
                }

                // Reposition button with new text
                const padding = CONFIG.layout.buttonRepositionPadding;
                Object.assign(elements.container.style, {
                    position: 'fixed',
                    left: `${randomRange(padding, window.innerWidth - elements.container.offsetWidth - padding)}px`,
                    top: `${randomRange(padding, window.innerHeight - elements.container.offsetHeight - padding)}px`,
                    transform: 'none',
                    pointerEvents: 'auto'
                });

                elements.buttonText.textContent = CONFIG.button.texts[currentClick];
                elements.buttonText.classList.remove('hidden');
                elements.buttonText.style.opacity = '0.9';
            };

            if (sound) {
                sound.onended = onSoundComplete;
                // Fallback: sound.duration is in seconds
                const fallbackMs = sound.duration > 0 ? (sound.duration * 1000) + 500 : 8000;
                setTimeout(onSoundComplete, fallbackMs);
            } else {
                setTimeout(onSoundComplete, 2000);
            }
        };

        const handleZalgo = () => {
            if (state.clickCount >= CONFIG.button.maxClicks) return;
            tempClass(elements.buttonText, 'zalgo', CONFIG.timing.zalgo.duration);
        };

        // =============================================
        // EFFECT SCHEDULING
        // =============================================
        const scheduleEffects = () => {
            const { timing, content } = CONFIG;

            // Blood drips (fixed interval)
            Scheduler.add(
                () => VisualEffects.drip(elements.drips),
                timing.drip.interval,
                timing.drip.probability,
                timing.drip.initialDelay
            );

            // Incantations (random intervals, mystical gray text)
            Scheduler.addRandom(
                () => FloatingText.show(
                    randomPick(elements.incantations),
                    randomPick(content.incantations),
                    {
                        duration: timing.incantation.duration.min + Math.random() * timing.incantation.duration.extra,
                        centerMargin: 120,
                        avoidElement: elements.container,
                        useSpecialDisappear: false
                    }
                ),
                timing.incantation.interval,
                timing.incantation.initialDelay
            );

            // Creepy texts (random intervals with cooldown, bloody Paint font)
            Scheduler.addRandom(
                () => FloatingText.show(
                    randomPick(elements.creepyTexts),
                    randomPick(content.creepyTexts),
                    {
                        duration: timing.creepyText.duration.min + Math.random() * timing.creepyText.duration.extra,
                        centerMargin: 150,
                        avoidElement: elements.container,
                        useSpecialDisappear: true,
                        effectDuration: 2000,
                        cooldown: timing.creepyText.cooldown
                    }
                ),
                timing.creepyText.interval,
                timing.creepyText.initialDelay
            );

            // Visual glitches
            Scheduler.add(
                () => VisualEffects.glitch(),
                timing.glitch.interval,
                timing.glitch.probability,
                timing.glitch.initialDelay
            );

            Scheduler.add(
                () => VisualEffects.distortion(),
                timing.distortion.interval,
                timing.distortion.probability,
                timing.distortion.initialDelay
            );

            // Button effects
            Scheduler.add(
                handleZalgo,
                timing.zalgo.interval,
                timing.zalgo.probability,
                timing.zalgo.initialDelay
            );

            Scheduler.add(
                () => ButtonTeaser.show(timing.teaser.duration),
                timing.teaser.interval,
                timing.teaser.probability,
                timing.teaser.initialDelay
            );

            // Blood writing
            Scheduler.add(
                () => BloodWriting.show({
                    letterDelay: timing.bloodWriting.letterDelay,
                    holdDuration: timing.bloodWriting.holdDuration,
                    avoidElement: elements.container,
                    centerMargin: 300
                }),
                timing.bloodWriting.interval,
                timing.bloodWriting.probability,
                timing.bloodWriting.initialDelay
            );
        };

        // =============================================
        // INITIALIZATION
        // =============================================
        const init = () => {
            // Initialize modules
            CustomCursor.init(elements.cursor);
            BloodWriting.init(elements.bloodWriting, CONFIG.content.bloodWritingPhrases);
            ButtonTeaser.init(elements.buttonText, CONFIG.button.teaserTexts);

            // Register audio
            AudioManager.register('ambient', elements.ambientSound, CONFIG.audio.ambient);
            elements.crySounds.forEach((sound, i) => {
                AudioManager.register(`cry${i}`, sound, CONFIG.audio.cry);
            });

            // Event listeners
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('click', handleFirstInteraction, { once: true });
            document.addEventListener('keydown', handleFirstInteraction, { once: true });
            document.addEventListener('touchstart', handleFirstInteraction, { once: true });
            elements.button.addEventListener('click', handleButtonClick);

            // Start ambient effects
            scheduleEffects();
        };

        init();
    })();
    </script>
</body>
</html>
